apiVersion: v1
kind: ResourceQuota
metadata:
  name: quiz-app-quota
  namespace: quiz-app
spec:
  hard:
    pods: "5"
    services: "3"
    requests.cpu: "250m"
    requests.memory: "320Mi"
    limits.cpu: "500m"
    limits.memory: "640Mi"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: quiz-app-limitrange
  namespace: quiz-app
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      default:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "200m"
        memory: "256Mi"
