name: Build and Push

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write  # Required to push to GHCR
  security-events: write  # Required to upload SARIF results

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires the image name to be fully lowercase
      - name: Set lowercase image name
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/quiz-site" >> $GITHUB_ENV

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
        if: always() && github.event_name == 'push'

      - name: Push image to GHCR
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        if: github.event_name == 'push'

      
      - name: Sign image with Cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            --tlog-upload=false \
            ${{ env.IMAGE }}:${{ github.sha }}

        if: github.event_name == 'push'

      - name: Verify image signature
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          cosign verify --key env://COSIGN_PUBLIC_KEY \
            --insecure-ignore-tlog \
            ${{ env.IMAGE }}:${{ github.sha }}

        if: github.event_name == 'push'

      - name: Print image reference
        run: |
          echo "Image pushed:"
          echo "  ${{ env.IMAGE }}:${{ github.sha }}"
          echo "  ${{ env.IMAGE }}:latest"
          echo ""
          echo "View at: https://github.com/${{ github.repository }}/pkgs/container/quiz-site"
