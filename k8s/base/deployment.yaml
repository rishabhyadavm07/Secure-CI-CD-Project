apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-site
  namespace: quiz-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quiz-site
  template:
    metadata:
      labels:
        app: quiz-site
    spec:
      serviceAccountName: quiz-site
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: quiz-site
          image: ghcr.io/rishabhyadavm07/secure-ci-cd-project/quiz-site:latest
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
