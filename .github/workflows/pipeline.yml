name: Build and Push

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write  # Required to push to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires the image name to be fully lowercase
      - name: Set lowercase image name
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/quiz-site" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Print image reference
        run: |
          echo "Image pushed:"
          echo "  ${{ env.IMAGE }}:${{ github.sha }}"
          echo "  ${{ env.IMAGE }}:latest"
          echo ""
          echo "View at: https://github.com/${{ github.repository }}/pkgs/container/quiz-site"
